name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [14.x]
    name: test - node ${{ matrix.node-version }}
    steps:
    - uses: actions/checkout@v1
    - name: set node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v1
      with:
        node-version: ${{ matrix.node-version }}
    - name: npm install
      run: npm install
    - name: npm run build
      run: npm run build
    - name: npm run test
      run: npm run test --ci

  release:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
    - uses: actions/checkout@v5
    - name: set node.js 24
      uses: actions/setup-node@v6
      with:
        node-version: 24
    - name: npm install
      run: npm install
    - name: npm run build
      run: npm run build
    - name: Release
      uses: cycjimmy/semantic-release-action@v6
      with:
        extra_plugins: |
          @semantic-release/changelog
          @semantic-release/git
        branches: master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
